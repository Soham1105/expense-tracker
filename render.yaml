# Render Blueprint — deploys the FastAPI app as a Docker web service.
# In Render: New → Blueprint → point at this repo. Then fill in the env vars
# marked sync:false (they are secrets and are NOT stored in the repo).
services:
  - type: web
    name: expense-tracker
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    # Same region as the Supabase database (ap-southeast-1). Keeping the app
    # next to the DB is critical: pages run dozens of queries, and cross-region
    # round trips (~180ms each) made every page load take seconds.
    region: singapore
    envVars:
      - key: DATABASE_URL
        sync: false          # paste your Supabase connection string
      - key: APP_USERNAME
        sync: false          # your login username
      - key: APP_PASSWORD
        sync: false          # your login password (strong!)
